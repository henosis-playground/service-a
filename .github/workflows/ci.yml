name: ci

on:
  push:

permissions:
  contents: read

jobs:
  henosis-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Typecheck Henosis component
        run: |
          corepack enable
          corepack pnpm@11.3.0 --dir henosis install --frozen-lockfile
          corepack pnpm@11.3.0 --dir henosis exec tsc --noEmit --pretty false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Exercise HTTP service
        shell: bash
        run: |
          node src/server.js >server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/healthz >/tmp/healthz.txt; then
              break
            fi
            sleep 1
          done

          test "$(cat /tmp/healthz.txt)" = "ok"
          body="$(curl -fsS http://127.0.0.1:3000/)"
          node -e 'const body = JSON.parse(process.argv[1]); if (body.service !== "service-a") process.exit(1);' "$body"
          sleep 35

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fake image build
        shell: bash
        run: |
          DIGEST="sha256:$(git archive HEAD | sha256sum | cut -d' ' -f1)"
          printf '%s\n' "$DIGEST" > digest.txt
          {
            echo "### Image digest"
            echo
            echo "\`$DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: digest.txt
          if-no-files-found: error
